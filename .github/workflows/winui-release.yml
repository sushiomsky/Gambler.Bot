name: WinUI Build and Release

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "Platforms/Gambler.Bot.WinUI/**"
      - "Platforms/Gambler.Bot.WinUI.Core/**"
      - "Platforms/Gambler.Bot.WinUI.Tests/**"
      - "Gambler.Bot.sln"
      - ".github/workflows/winui-release.yml"
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
    paths:
      - "Platforms/Gambler.Bot.WinUI/**"
      - "Platforms/Gambler.Bot.WinUI.Core/**"
      - "Platforms/Gambler.Bot.WinUI.Tests/**"
      - "Gambler.Bot.sln"
      - ".github/workflows/winui-release.yml"

permissions:
  contents: write

jobs:
  build-test-package:
    name: Build, Test, Package WinUI
    runs-on: windows-latest
    defaults:
      run:
        working-directory: Gambler.Bot

    steps:
      - name: Checkout app repository
        uses: actions/checkout@v4
        with:
          path: Gambler.Bot

      - name: Checkout Core repository
        uses: actions/checkout@v4
        with:
          repository: Seuntjie900/Gambler.Bot.Core
          path: Gambler.Bot.Core

      - name: Checkout Strategies repository
        uses: actions/checkout@v4
        with:
          repository: Seuntjie900/Gambler.Bot.Strategies
          path: Gambler.Bot.Strategies

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore WinUI client
        run: dotnet restore .\Platforms\Gambler.Bot.WinUI\Gambler.Bot.WinUI.csproj

      - name: Restore WinUI tests
        run: dotnet restore .\Platforms\Gambler.Bot.WinUI.Tests\Gambler.Bot.WinUI.Tests.csproj

      - name: Build WinUI client
        run: dotnet build .\Platforms\Gambler.Bot.WinUI\Gambler.Bot.WinUI.csproj -c Release --no-restore

      - name: Run WinUI service tests
        run: dotnet test .\Platforms\Gambler.Bot.WinUI.Tests\Gambler.Bot.WinUI.Tests.csproj -c Release --no-restore --logger "trx;LogFileName=winui-tests.trx"

      - name: Publish WinUI win-x64
        run: >
          dotnet publish .\Platforms\Gambler.Bot.WinUI\Gambler.Bot.WinUI.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:WindowsAppSDKSelfContained=true
          -p:WindowsPackageType=None
          -p:PublishTrimmed=false
          -p:PublishSingleFile=false
          -o .\artifacts\Gambler.Bot.WinUI-win-x64

      - name: Create ZIP package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\artifacts\release | Out-Null
          Compress-Archive `
            -Path .\artifacts\Gambler.Bot.WinUI-win-x64\* `
            -DestinationPath .\artifacts\release\Gambler.Bot.WinUI-win-x64.zip `
            -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gambler.Bot.WinUI-win-x64
          path: .\Gambler.Bot\artifacts\release\Gambler.Bot.WinUI-win-x64.zip

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: .\Gambler.Bot\artifacts\release\Gambler.Bot.WinUI-win-x64.zip
          generate_release_notes: true
